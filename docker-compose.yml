version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scheduler-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scheduler-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/scheduler?schema=public
      - JWT_SECRET=production_grade_super_secret_key_123!
      - PORT=5000
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npm run prisma:seed && npm run start"

  worker-1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: scheduler-worker-1
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/scheduler?schema=public
      - NODE_ENV=production
      - WORKER_ID=worker-1
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  worker-2:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: scheduler-worker-2
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/scheduler?schema=public
      - NODE_ENV=production
      - WORKER_ID=worker-2
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: scheduler-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
